name: Alice-App Release

on:
  repository_dispatch:
    types: [release]

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.parse.outputs.version }}
      channel: ${{ steps.parse.outputs.channel }}
      skip: ${{ steps.patch-rule.outputs.skip }}
    steps:
      - uses: actions/checkout@v4

      - id: parse
        run: |
          TAG="${{ github.event.client_payload.tag }}"
          CHANNEL="${{ github.event.client_payload.channel }}"
          # 去掉 ac/ 前缀
          VERSION="${TAG#ac/}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "channel=$CHANNEL" >> $GITHUB_OUTPUT

      # 补丁版本规则：stable 通道仅在 1.x ~ 2.x 构建
      - id: patch-rule
        run: |
          VERSION="${{ steps.parse.outputs.version }}"
          CHANNEL="${{ steps.parse.outputs.channel }}"
          MAJOR="${VERSION%%.*}"
          PATCH="${VERSION##*.}"

          if [ "$CHANNEL" == "stable" ] && [ "$MAJOR" -gt 2 ] && [ "$PATCH" -gt 0 ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Patch releases not allowed for major > 2"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

  build:
    needs: validate
    if: needs.validate.outputs.skip != 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate.outputs.channel == 'beta' && 'preview' || 'main' }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install

      # 编译所有 workspace 包（shared → agent-core）
      - run: pnpm -r build

      # electron-builder 输出目录为 release/
      - run: pnpm electron-builder -- --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-win
          path: release/
          if-no-files-found: error

  publish:
    needs: [validate, build]
    if: needs.validate.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-win

      - name: Display release files
        run: ls -la

      - name: Upload to R2 (channel-based)
        continue-on-error: true
        env:
          R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          CHANNEL=${{ needs.validate.outputs.channel }}

          # 上传到 R2: {channel}/
          # 文件结构:
          #   latest.yml          ← Windows 更新清单 (electron-builder 生成，含 SHA512)
          #   *.exe               ← 安装包
          #   *.exe.blockmap      ← 差分更新数据 (同 minor 升级仅下载增量)
          rclone copy . :r2:alice-mod-releases/${CHANNEL}/ \
            --s3-endpoint https://${CLOUDFLARE_ACCOUNT_ID}.r2.cloudflarestorage.com

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.validate.outputs.version }}
          files: |
            *.exe
            *.exe.blockmap
            latest.yml
          generate_release_notes: true
